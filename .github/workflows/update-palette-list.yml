name: Update Palette List

on:
  push:
    branches: [main]
    paths:
      - "vanilla_palette_*.nbt"
      - "scripts/generate_palette_list.py"
      - ".github/workflows/update-palette-list.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate palettes.json
        run: python scripts/generate_palette_list.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add palettes.json
          if git diff --cached --quiet; then
            echo "palettes.json is up to date, nothing to commit."
          else
            git commit -m "chore: auto-update palettes.json"
            git push
          fi
